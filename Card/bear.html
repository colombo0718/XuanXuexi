<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <title>Sentence Summoner - 熊 名詞卡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --card-bg: #ffffff;
      --card-border: #4caf50;
      --card-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
      --text-main: #222;
      --text-sub: #555;
      --accent: #2e7d32;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", "Noto Sans CJK SC", "PingFang SC", sans-serif;
      background: radial-gradient(circle at top, #e8f5e9, #c8e6c9);
      color: var(--text-main);
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .hint {
      font-size: 0.8rem;
      color: #2e7d32;
      opacity: 0.8;
    }

    .card {
      position: relative;
      width: min(360px, 90vw);
      aspect-ratio: 63 / 88;
      background: var(--card-bg);
      border-radius: 16px;
      border: 3px solid var(--card-border);
      box-shadow: var(--card-shadow);
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* 卡片標題區（左上角） */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .card-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card-title-main {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-title-sub {
      font-size: 0.75rem;
      color: var(--text-sub);
    }

    .tag-badge {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(46, 125, 50, 0.5);
      font-size: 0.7rem;
      color: var(--accent);
      background: rgba(232, 245, 233, 0.7);
    }

    /* 四維屬性列在上方 */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 8px;
      margin-top: 2px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 2px;
      border-radius: 10px;
      background: #f1f8e9;
    }

    .stat-icon {
      font-size: 1rem;
      line-height: 1;
      margin-bottom: 2px;
    }

    .stat-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sub);
      margin-bottom: 1px;
    }

    .stat-value {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* 中央主體 */
    .card-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 4px 0 6px;
    }

    .bear-img {
      width: 120px;
      height: 120px;
    }

    .word-block {
      text-align: center;
    }

    .hanzi {
      font-size: 3.4rem;
      line-height: 1;
      margin-bottom: 2px;
    }

    .pinyin {
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      color: var(--text-sub);
    }

    /* 底部小提示 */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--text-sub);
      margin-top: 4px;
    }

    .footer-pill {
      padding: 2px 8px;
      border-radius: 999px;
      background: #e8f5e9;
    }

    @media (max-height: 600px) {
      body {
        align-items: flex-start;
      }
      .card {
        transform: scale(0.9);
        transform-origin: top center;
      }
    }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div class="card">
      <!-- 上方：標題＋卡片類型 -->
      <div>
        <div class="card-header">
          <div class="card-title">
            <div class="card-title-main">SENTENCE SUMMONER</div>
            <div class="card-title-sub">名詞卡 · Noun Unit</div>
          </div>
          <div class="tag-badge">熊 · Bear</div>
        </div>

        <!-- 四維屬性列 -->
        <div class="stats-row">
          <div class="stat">
            <div class="stat-icon">❤️</div>
            <div class="stat-label">HP</div>
            <div class="stat-value">5</div>
          </div>
          <div class="stat">
            <div class="stat-icon">⚔️</div>
            <div class="stat-label">ATK</div>
            <div class="stat-value">4</div>
          </div>
          <div class="stat">
            <div class="stat-icon">🛡️</div>
            <div class="stat-label">DEF</div>
            <div class="stat-value">3</div>
          </div>
          <div class="stat">
            <div class="stat-icon">🦶</div>
            <div class="stat-label">SPD</div>
            <div class="stat-value">2</div>
          </div>
        </div>
      </div>

      <!-- 中央：熊圖＋中文字＋拼音 -->
      <div class="card-main">
        <img
          class="bear-img"
          src="https://cdn.jsdelivr.net/gh/hfg-gmuend/openmoji/color/618x618/1F43B.png"
          alt="bear"
          crossorigin="anonymous"
        />
        <div class="word-block">
          <div class="hanzi">熊</div>
          <div class="pinyin">xióng</div>
        </div>
      </div>

      <!-- 底部：小提示／系列名 -->
      <div class="card-footer">
        <div class="footer-pill">詞性：名詞 N</div>
        <div>LeafLune · v0.1 mock</div>
      </div>
    </div>

    <div class="hint">（之後可以照這個版型改成 Canvas／批次產卡）</div>
  </div>
</body>
</html>
